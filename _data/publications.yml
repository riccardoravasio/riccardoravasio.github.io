# Edit this file to add / update publications. Each entry shows up automatically
# on /publications.html (and the top three on the home page).
#
# Fields:
#   year     — integer
#   authors  — string ("R. Ravasio, A. N. Other")
#   title    — string
#   venue    — string ("Phys. Rev. Lett. 130, 058101")
