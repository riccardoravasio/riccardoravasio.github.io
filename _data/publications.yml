- year: 2019
  authors: "R Ravasio, SM Flatt, L Yan, S Zamuner, C Brito, M Wyart"
  title: "Mechanics of allostery: contrasting the induced fit and population shift scenarios"
  venue: "Biophysical Journal 117 (10), 1954–1962"
  url: "https://doi.org/10.1016/j.bpj.2019.10.002"
  description: >-
    Our earlier work on the design of allosteric elastic networks fell within the induced-fit scenario, 
    where binding shifts the location of a single energy minimum. Here, we extend the analysis to the 
    population-shift scenario, where the soft mode connects two pre-existing energy wells. 
    The optimal-stiffness principle of induced fit gives way to a plateau: above a characteristic stiffness 
    k*_a ∼ 1/N, cooperativity saturates rather than decays, making population-shift architectures more 
    robust to mutations that stiffen the allosteric mode. Using crystallographic data from 34 allosteric 
    proteins, we show that the allosteric response is simultaneously spatially extended and rich in shear 
    strain, and that mode stiffness anti-correlates with protein size, as predicted.
  tags:
    - allostery

