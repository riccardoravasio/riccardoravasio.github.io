- year: 2026
  authors: "R Ravasio<sup>*</sup>, K Husain<sup>*</sup>, CG Evans, R Phillips, M Ribezzi-Crivellari, et al."
  title: "Evolution of error correction through a need for speed"
  venue: "Science 391 (6787), 818–824"
  url: "https://www.science.org/doi/10.1126/science.adt1275"
  featured: true
  description: >-
    Biological processes across scales, from DNA replication to macromolecular
    self-assembly, have complex error correction machineries to fix errors
    introduced by forces of disorder, which otherwise would lead to loss of
    genetic information or cell death. Molecular machines like the ribosome
    and polymerases have evolved proofreading domains
    that double-check their progress at the cost of time and energy. We found
    that molecular processes pressured to go fast can evolve such complex error
    correction machinery, even without any pressure to avoid mistakes. This is
    because the insertion of a wrong component stalls the process and
    error correction makes everything faster by avoiding this
    time cost of stalls. Our findings suggest that life's earliest molecular
    machines could have stumbled onto error correction and thus achieved low
    error rates purely by racing against the clock.
  tags:
    - evolution
    - non-equilibrium

